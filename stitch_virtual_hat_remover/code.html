<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="User avatar profile picture in a circular frame, high quality portrait of a young man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTsZ9QZTTfddRptlkNg1soVAPhdvPkjK1B4gBGfTaw87nopOnap8iaOSUicjTMo3WMLQINB2DelfxYeGbGwl2DEPRQ_FPripquOl-EJWUeeztvdA1z7TIwe7xaSRQ94BTUgVBRGxROcfZwIqzAMw2dWJHJ2yN97FPvrlcRTW0Bx5Jbs7p16OfWwLuhBrDwTiQNSvRbWxbMW7aS99Jrm7uQANaPOV3kusJbiZsRA4HQORSAWBZ4_VQnmTG7Ig3rq8VjLrFMw8ifv8c"/>

<button class="text-slate-400 hover:bg-[#1E293B] transition-colors p-2 rounded-lg active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined">settings</span>
</button>

<main class="pt-20 px-container-padding flex flex-col gap-xl">
<!-- Top Section: Avatar Showcase -->
<section class="flex flex-col items-center">
<div class="relative w-64 h-64 mb-6">
<!-- Radial Halo -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary-container/20 to-transparent rounded-full blur-3xl opacity-50"></div>
<!-- Avatar Frame -->
<div class="relative w-full h-full rounded-3xl p-1 bg-gradient-to-b from-primary-container to-transparent shadow-[0_0_30px_rgba(250,204,21,0.2)]">
<div class="w-full h-full bg-[#1E293B] rounded-[22px] overflow-hidden flex items-center justify-center">
<img class="w-48 h-48 object-contain" data-alt="Character avatar level 2 explorer wearing a stylish brimmed hat, playful adventure style digital art with soft glow" src="https://lh3.googleusercontent.com/aida/ADBb0uh7THY_xtwtWyBlSwfzNrRs5ETS8u5petzWfKhaIJNPIQE7wO_NYkdvMbgYuFNesu5aR4mpZwVSYur2nUsAL1vyqzXcLaYhs3DD89J8XFPMOnCChf8sgWVu0LsXa0LKjfEchyNEruxD--CTa7LRWthYHJMIkc53OyBa1PzasLsr7LHSk7CSw7lYdL_337srwz_HzQycxebiexu2Wu0B2T8GCuA9P-fAf4tmuPxzgeIyVR6QCYO7WXi2zJ0"/>
</div>
</div>

<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">military_tech</span>
<span class="font-xp-display text-xp-display whitespace-nowrap">Level 2 Explorer</span>
</div>
</div>
<!-- Liquid XP Bar -->
<div class="w-full max-w-xs space-y-2">
<div class="flex justify-between items-end mb-1">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Experience</span>
<span class="font-xp-display text-xp-display text-primary-container">750 / 1000 XP</span>
</div>
<div class="h-4 w-full bg-surface-container-highest rounded-full overflow-hidden p-0.5 border border-outline-variant/30">
<div class="h-full bg-gradient-to-r from-secondary-container to-primary-container rounded-full relative" style="width: 75%;">
<div class="absolute inset-0 bg-white/20 blur-[2px] h-1/2 rounded-full"></div>
</div>
</div>
</div>
</section>
<!-- Middle Section: The Hero's Path -->
<section class="relative py-8">
<div class="flex flex-col items-center space-y-12 relative">
<!-- SVG Path Connector -->
<svg class="absolute top-10 left-1/2 -translate-x-1/2 w-48 h-[400px] -z-10" fill="none" preserveaspectratio="none" viewbox="0 0 100 400">
<path class="path-curve" d="M50 0 C 80 100, 20 200, 50 300 C 80 400, 20 500, 50 600" stroke="#1E293B" stroke-linecap="round" stroke-width="4"></path>

</div>
<div class="text-center">
<h4 class="font-headline-md text-body-sm text-on-surface-variant">The Beginning</h4>
</div>
</div>
<!-- Node 2: Current -->

<!-- Glowing Aura -->

<div class="w-20 h-20 rounded-full bg-primary-container border-4 border-[#0F172A] flex items-center justify-center shadow-[0_0_20px_rgba(250,204,21,0.4)] relative z-10">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
</div>
<div class="text-center z-10">
<h4 class="font-headline-md text-headline-md text-primary-container">Explorer's Discovery</h4>
<p class="font-label-md text-label-md text-on-surface-variant">CURRENT CHAPTER</p>
</div>
</div>

</div>
</div>

<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">rocket_launch</span>
                Jump into Action
            </button>
</section>

<a class="flex flex-col items-center justify-center text-slate-500 p-2.5 hover:text-white transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">person_play</span>
</a>
<!-- Active Tab: Explorer/Discovery maps to Timeline-like progression -->
<a class="flex flex-col items-center justify-center bg-[#FACC15]/10 text-[#FACC15] rounded-xl p-2.5 shadow-[0_0_15px_rgba(250,204,21,0.1)] active:scale-90 transition-all duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timeline</span>

<span class="material-symbols-outlined">military_tech</span>
