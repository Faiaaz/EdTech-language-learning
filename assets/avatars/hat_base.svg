  <path d="M42 66 Q100 50 158 66 Q158 76 150 80 Q120 90 100 90 Q80 90 50 80 Q42 76 42 66 Z" fill="url(#brim)"/>

  <!-- Crown -->
  <path d="M62 64 Q64 24 100 20 Q136 24 138 64 Q120 70 100 70 Q80 70 62 64 Z" fill="url(#crown)"/>

  <!-- Crown shine -->
  <path d="M62 64 Q64 24 100 20 Q136 24 138 64 Q120 70 100 70 Q80 70 62 64 Z" fill="url(#shine)"/>

  <!-- Band -->
  <path d="M58 58 Q100 50 142 58 L142 72 Q100 80 58 72 Z" fill="url(#band)"/>

  <!-- Band stitch -->
  <path d="M60 66 Q100 74 140 66" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>

  <!-- Medallion -->
  <circle cx="100" cy="66" r="7" fill="#D4AF37"/>
  <circle cx="100" cy="66" r="4" fill="#6B3F22" opacity="0.55"/>
  <path d="M96.5 66 L99 68.5 L103.5 63.5" stroke="#FFF3C4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
