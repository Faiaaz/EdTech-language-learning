<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- Premium explorer hat with depth and subtle highlights. -->
  <defs>
    <linearGradient id="crown" x1="60" y1="18" x2="140" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B17642"/>
      <stop offset="0.55" stop-color="#8A552F"/>
      <stop offset="1" stop-color="#6B3F22"/>
    </linearGradient>
    <linearGradient id="brim" x1="44" y1="60" x2="156" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A4A29"/>
      <stop offset="1" stop-color="#4F2D18"/>
    </linearGradient>
    <linearGradient id="band" x1="56" y1="54" x2="144" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2B1A10"/>
      <stop offset="0.55" stop-color="#3A2416"/>
      <stop offset="1" stop-color="#24160E"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(92 38) rotate(35) scale(60 36)">
      <stop offset="0" stop-color="#F3D6A7" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#F3D6A7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Brim shadow -->
  <path d="M46 72 Q100 86 154 72 Q150 82 140 86 Q100 96 60 86 Q50 82 46 72 Z" fill="#000000" opacity="0.16"/>

