<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- Male anime face: sharp almond eyes, thin angled brows, small
       neutral-happy mouth. No blush. -->

  <!-- Thin angled brows (masculine tilt) -->
  <path d="M70 92 L92 96" stroke="#0B1220" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M108 96 L130 92" stroke="#0B1220" stroke-width="3.6" stroke-linecap="round"/>

  <!-- LEFT EYE -->
  <!-- White sclera, almond shape -->
  <path
    d="M74 110
       Q80 102 92 102
       Q96 102 96 106
       Q96 114 88 116
       Q78 116 74 112 Z"
    fill="#FFFFFF"
    stroke="#0B1220"
    stroke-width="1.8"
    stroke-linejoin="round"
  />
  <!-- Upper lash line (thicker) -->
  <path d="M74 110 Q82 103 92 102" stroke="#0B1220" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <!-- Iris -->
  <ellipse cx="86" cy="110" rx="5" ry="6" fill="#1E3A8A"/>
  <!-- Pupil -->
  <ellipse cx="86" cy="110" rx="2.2" ry="3.4" fill="#0B1220"/>
  <!-- Highlights -->
  <circle cx="84" cy="107.5" r="1.8" fill="#FFFFFF"/>
  <circle cx="88.5" cy="112.5" r="1.0" fill="#FFFFFF" opacity="0.75"/>

  <!-- RIGHT EYE (mirrored) -->
  <path
    d="M126 110
       Q120 102 108 102
       Q104 102 104 106
       Q104 114 112 116
       Q122 116 126 112 Z"
    fill="#FFFFFF"
    stroke="#0B1220"
    stroke-width="1.8"
    stroke-linejoin="round"
  />
  <path d="M126 110 Q118 103 108 102" stroke="#0B1220" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <ellipse cx="114" cy="110" rx="5" ry="6" fill="#1E3A8A"/>
  <ellipse cx="114" cy="110" rx="2.2" ry="3.4" fill="#0B1220"/>
  <circle cx="112" cy="107.5" r="1.8" fill="#FFFFFF"/>
  <circle cx="116.5" cy="112.5" r="1.0" fill="#FFFFFF" opacity="0.75"/>

  <!-- Nose hint (single clean line) -->
  <path d="M100 122 Q98 128 102 132" stroke="#0B1220" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Subtle cheek tone (not pink blush) -->
  <path d="M72 130 Q78 134 86 132" stroke="#0B1220" stroke-opacity="0.08" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M128 130 Q122 134 114 132" stroke="#0B1220" stroke-opacity="0.08" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Mouth: small, confident -->
  <path d="M94 140 Q100 144 106 140" stroke="#0B1220" stroke-width="2.6" stroke-linecap="round" fill="none"/>
  <path d="M100 144 L100 146" stroke="#0B1220" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
</svg>
